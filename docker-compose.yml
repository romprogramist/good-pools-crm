services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* должны быть доступны при `next build` (впекаются в client-bundle).
        # Читается из shell через `docker compose --env-file .env.production build`.
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    image: gpcrm-app:latest
    container_name: gpcrm-app
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3010:3000"
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gpcrm_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: gpcrm-worker:latest
    container_name: gpcrm-worker
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
    networks:
      - gpcrm_net

networks:
  gpcrm_net:
    name: gpcrm_net
